<!DOCTYPE html>
<html>
<head>
  <title>Inventory System</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white flex justify-center p-10">

<div class="w-[900px] bg-slate-800 p-6 rounded-xl shadow-lg">

  <h2 class="text-2xl font-bold text-center mb-6">🚀 Inventory Dashboard</h2>

  <!-- Form -->
  <div class="space-y-3">
    <input id="name" placeholder="Product Name" class="w-full p-3 rounded bg-slate-900">
    <input id="price" placeholder="Price" class="w-full p-3 rounded bg-slate-900">
    <input id="quantity" placeholder="Quantity" class="w-full p-3 rounded bg-slate-900">

    <button onclick="addProduct()" class="w-full bg-green-500 p-3 rounded hover:bg-green-600">
      Add / Update Product
    </button>
  </div>

  <!-- Top Bar -->
  <div class="flex justify-between items-center mt-6">
    <h3>Total: <span id="totalValue">₹0</span></h3>
    <input id="search" placeholder="Search..." onkeyup="searchProduct()" class="p-2 rounded bg-slate-900">
  </div>

  <!-- Table -->
  <table class="w-full mt-6 text-center">
    <thead class="bg-slate-700">
      <tr>
        <th class="p-2">Name</th>
        <th class="p-2">Price</th>
        <th class="p-2">Quantity</th>
        <th class="p-2">Actions</th>
      </tr>
    </thead>

    <tbody id="tableBody"></tbody>
  </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>

</body>
</html>
