<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body class="bg-slate-900 text-white">

<div class="p-6 max-w-6xl mx-auto">

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-6">

    <div>
      <h1 class="text-3xl font-bold">⚡ Inventory System</h1>
      <p class="text-green-400 text-sm">Status: Active</p>
    </div>

    <div class="flex items-center gap-3 bg-slate-800 px-3 py-2 rounded-lg">
      <img id="avatar" class="w-9 h-9 rounded-full border border-slate-600">
      <span id="username" class="font-semibold"></span>
      <button onclick="logout()" class="bg-green-500 px-3 py-1 rounded">Logout</button>
    </div>

  </div>

  <!-- CARD -->
  <div class="bg-slate-800 p-4 rounded-lg mb-4 shadow">
    <h2>Total Value: ₹<span id="totalValue">0</span></h2>
  </div>

  <!-- FORM -->
  <div class="flex gap-3 mb-4">
    <input id="name" placeholder="Name" class="p-2 bg-slate-800 rounded w-full">
    <input id="price" placeholder="Price" class="p-2 bg-slate-800 rounded w-full">
    <input id="quantity" placeholder="Qty" class="p-2 bg-slate-800 rounded w-full">

    <button id="addBtn" onclick="addProduct()" class="bg-green-500 px-4 rounded">Add</button>
    <button id="updateBtn" onclick="updateProduct()" class="bg-blue-500 px-4 rounded hidden">Update</button>
  </div>

  <input id="search" placeholder="Search..."
    class="p-2 mb-4 bg-slate-800 rounded w-60"
    oninput="filterProducts()">

  <!-- TABLE -->
  <div class="bg-slate-800 rounded-lg p-4">
    <table class="w-full">
      <thead class="text-gray-400">
        <tr>
          <th class="text-left p-2">Name</th>
          <th class="text-left p-2">Price</th>
          <th class="text-left p-2">Qty</th>
          <th class="text-left p-2">Actions</th>
        </tr>
      </thead>
      <tbody id="productList"></tbody>
    </table>
  </div>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
