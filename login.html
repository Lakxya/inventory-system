<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body class="bg-gradient-to-br from-slate-900 to-black flex items-center justify-center h-screen">

<div class="bg-white/10 backdrop-blur-lg p-8 rounded-xl w-80 text-white shadow-xl">

  <h2 class="text-2xl font-bold mb-4">Welcome Back 👋</h2>

  <input id="email" placeholder="Email" class="w-full p-3 mb-3 rounded bg-white/20">
  <input id="password" type="password" placeholder="Password" class="w-full p-3 mb-3 rounded bg-white/20">

  <button onclick="login()" class="w-full bg-green-500 p-3 rounded">Login</button>

  <button onclick="googleLogin()" class="w-full bg-white text-black mt-3 p-3 rounded">
    Continue with Google
  </button>

  <p class="mt-4 text-sm">
    Forgot password? <a href="reset.html" class="text-green-400">Reset</a>
  </p>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
